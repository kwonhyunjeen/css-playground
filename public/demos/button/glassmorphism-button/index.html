<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Glassmorphism Tab Bar</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>

    <!-- Tab radio inputs — MUST precede .glass-panel for CSS ~ selector -->
    <input type="radio" name="tab" id="tab-01" checked />
    <input type="radio" name="tab" id="tab-02" />
    <input type="radio" name="tab" id="tab-03" />
    <input type="radio" name="tab" id="tab-04" />

    <!-- Background blobs -->
    <div class="blobs" aria-hidden="true">
      <div class="blob blob--a"></div>
      <div class="blob blob--b"></div>
      <div class="blob blob--c"></div>
    </div>

    <!-- SVG clip-path definitions for tab bar icons -->
    <svg xmlns="http://www.w3.org/2000/svg" height="0" width="0" style="position:absolute" aria-hidden="true">
      <defs>
        <clipPath id="ti-shape-01">
          <path d="M25.182 26.601A4.844 4.844 0 0121.762 28H4.838C2.166 28 0 25.85 0 23.197V11.014A3.464 3.464 0 011.354 8.35l9.125-7.305a4.336 4.336 0 015.529-.1l9.338 7.405a3.462 3.462 0 011.254 2.663v12.195c0 1.273-.51 2.493-1.418 3.392z"/>
        </clipPath>
        <clipPath id="ti-detail-01">
          <rect width="11.657" height="2.743" x="7.2" y="20.914" rx="1.371"/>
        </clipPath>
        <clipPath id="ti-shape-02">
          <path d="M20.076 0H7.938C3.192 0 0 3.332 0 8.288v11.438C0 24.668 3.192 28 7.938 28h12.138C24.822 28 28 24.668 28 19.726V8.288C28 3.332 24.822 0 20.076 0z"/>
        </clipPath>
        <clipPath id="ti-detail-02">
          <path d="M21.325 11.52l-4.001 5.164a1.034 1.034 0 01-1.478.184l-3.84-3.012-3.46 4.475a1.035 1.035 0 01-1.908-.603 1.007 1.007 0 01.222-.639l4.136-5.335a1.035 1.035 0 011.465-.197l3.841 3.024 3.373-4.339a1.022 1.022 0 011.453-.209c.452.354.54 1.003.197 1.463v.025z"/>
        </clipPath>
        <clipPath id="ti-shape-03">
          <path d="M20.076 0H7.938C3.192 0 0 3.332 0 8.288v11.438C0 24.668 3.192 28 7.938 28h12.138C24.822 28 28 24.668 28 19.726V8.288C28 3.332 24.822 0 20.076 0z"/>
        </clipPath>
        <clipPath id="ti-detail-03">
          <path d="M6.19 13.833a1.62 1.62 0 001.615 1.615 1.62 1.62 0 001.615-1.615c0-.888-.727-1.613-1.615-1.613s-1.614.725-1.614 1.613zm7.644 1.615a1.62 1.62 0 01-1.615-1.614c0-.888.726-1.613 1.615-1.613.888 0 1.614.725 1.614 1.613a1.62 1.62 0 01-1.614 1.614zm6.027 0a1.62 1.62 0 01-1.614-1.614c0-.888.726-1.613 1.614-1.613.888 0 1.601.725 1.601 1.613s-.713 1.615-1.6 1.615z"/>
        </clipPath>
        <clipPath id="ti-shape-04">
          <path d="M28 14c0 7.732-6.268 14-14 14S0 21.732 0 14C0 6.27 6.268 0 14 0s14 6.27 14 14z"/>
        </clipPath>
        <clipPath id="ti-detail-04">
          <path d="M19.404 9.044l-2.268 7.168a.912.912 0 01-.616.617l-7.14 2.239c-.476.155-.938-.308-.784-.784l2.24-7.182a.935.935 0 01.616-.616l7.168-2.24a.629.629 0 01.784.798"/>
        </clipPath>
      </defs>
    </svg>

    <!-- Big Glass Panel -->
    <div class="glass-panel">

      <!-- Tab Content Panels -->
      <div class="tab-panels">

        <!-- Panel 1: Communication -->
        <div class="panel panel--01">
          <div class="card">
            <input type="checkbox" id="c-01" class="card-input" />
            <label for="c-01" class="card-label">
              <div class="card-icon">
                <span class="ci-detail"><svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg></span>
                <span class="ci-glass"></span>
                <span class="ci-bg"></span>
              </div>
              <span class="card-name">Mail</span>
            </label>
          </div>
          <div class="card">
            <input type="checkbox" id="c-02" class="card-input" />
            <label for="c-02" class="card-label">
              <div class="card-icon">
                <span class="ci-detail"><svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M6.62 10.79c1.44 2.83 3.76 5.14 6.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z"/></svg></span>
                <span class="ci-glass"></span>
                <span class="ci-bg"></span>
              </div>
              <span class="card-name">Phone</span>
            </label>
          </div>
          <div class="card">
            <input type="checkbox" id="c-03" class="card-input" />
            <label for="c-03" class="card-label">
              <div class="card-icon">
                <span class="ci-detail"><svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg></span>
                <span class="ci-glass"></span>
                <span class="ci-bg"></span>
              </div>
              <span class="card-name">Message</span>
            </label>
          </div>
          <div class="card">
            <input type="checkbox" id="c-04" class="card-input" />
            <label for="c-04" class="card-label">
              <div class="card-icon">
                <span class="ci-detail"><svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M17 10.5V7c0-.55-.45-1-1-1H4c-.55 0-1 .45-1 1v10c0 .55.45 1 1 1h12c.55 0 1-.45 1-1v-3.5l4 4v-11l-4 4z"/></svg></span>
                <span class="ci-glass"></span>
                <span class="ci-bg"></span>
              </div>
              <span class="card-name">FaceTime</span>
            </label>
          </div>
        </div>

        <!-- Panel 2: Media -->
        <div class="panel panel--02">
          <div class="card">
            <input type="checkbox" id="c-05" class="card-input" />
            <label for="c-05" class="card-label">
              <div class="card-icon">
                <span class="ci-detail"><svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg></span>
                <span class="ci-glass"></span>
                <span class="ci-bg"></span>
              </div>
              <span class="card-name">Volume</span>
            </label>
          </div>
          <div class="card">
            <input type="checkbox" id="c-06" class="card-input" />
            <label for="c-06" class="card-label">
              <div class="card-icon">
                <span class="ci-detail"><svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg></span>
                <span class="ci-glass"></span>
                <span class="ci-bg"></span>
              </div>
              <span class="card-name">Music</span>
            </label>
          </div>
          <div class="card">
            <input type="checkbox" id="c-07" class="card-input" />
            <label for="c-07" class="card-label">
              <div class="card-icon">
                <span class="ci-detail"><svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M9 2L7.17 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2h-3.17L15 2H9zm3 15c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg></span>
                <span class="ci-glass"></span>
                <span class="ci-bg"></span>
              </div>
              <span class="card-name">Camera</span>
            </label>
          </div>
          <div class="card">
            <input type="checkbox" id="c-08" class="card-input" />
            <label for="c-08" class="card-label">
              <div class="card-icon">
                <span class="ci-detail"><svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M12 14c1.66 0 2.99-1.34 2.99-3L15 5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5.3-3c0 3-2.54 5.1-5.3 5.1S6.7 14 6.7 11H5c0 3.41 2.72 6.23 6 6.72V21h2v-3.28c3.28-.48 6-3.3 6-6.72h-1.7z"/></svg></span>
                <span class="ci-glass"></span>
                <span class="ci-bg"></span>
              </div>
              <span class="card-name">Microphone</span>
            </label>
          </div>
        </div>

        <!-- Panel 3: Connectivity -->
        <div class="panel panel--03">
          <div class="card">
            <input type="checkbox" id="c-09" class="card-input" />
            <label for="c-09" class="card-label">
              <div class="card-icon">
                <span class="ci-detail"><svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M1 9l2 2c4.97-4.97 13.03-4.97 18 0l2-2C16.93 2.93 7.08 2.93 1 9zm8 8l3 3 3-3c-1.65-1.66-4.34-1.66-6 0zm-4-4l2 2c2.76-2.76 7.24-2.76 10 0l2-2C15.14 9.14 8.87 9.14 5 13z"/></svg></span>
                <span class="ci-glass"></span>
                <span class="ci-bg"></span>
              </div>
              <span class="card-name">Wi-Fi</span>
            </label>
          </div>
          <div class="card">
            <input type="checkbox" id="c-10" class="card-input" />
            <label for="c-10" class="card-label">
              <div class="card-icon">
                <span class="ci-detail"><svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M17.71 7.71L12 2h-1v7.59L6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 11 14.41V22h1l5.71-5.71-4.3-4.29 4.3-4.29zM13 5.83l1.88 1.88L13 9.59V5.83zm1.88 10.46L13 18.17v-3.76l1.88 1.88z"/></svg></span>
                <span class="ci-glass"></span>
                <span class="ci-bg"></span>
              </div>
              <span class="card-name">Bluetooth</span>
            </label>
          </div>
          <div class="card">
            <input type="checkbox" id="c-11" class="card-input" />
            <label for="c-11" class="card-label">
              <div class="card-icon">
                <span class="ci-detail"><svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg></span>
                <span class="ci-glass"></span>
                <span class="ci-bg"></span>
              </div>
              <span class="card-name">Location</span>
            </label>
          </div>
          <div class="card">
            <input type="checkbox" id="c-12" class="card-input" />
            <label for="c-12" class="card-label">
              <div class="card-icon">
                <span class="ci-detail"><svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M21 16v-2l-8-5V3.5c0-.83-.67-1.5-1.5-1.5S10 2.67 10 3.5V9l-8 5v2l8-2.5V19l-2 1.5V22l3.5-1 3.5 1v-1.5L13 19v-5.5l8 2.5z"/></svg></span>
                <span class="ci-glass"></span>
                <span class="ci-bg"></span>
              </div>
              <span class="card-name">Airplane</span>
            </label>
          </div>
        </div>

        <!-- Panel 4: System -->
        <div class="panel panel--04">
          <div class="card">
            <input type="checkbox" id="c-13" class="card-input" />
            <label for="c-13" class="card-label">
              <div class="card-icon">
                <span class="ci-detail"><svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg></span>
                <span class="ci-glass"></span>
                <span class="ci-bg"></span>
              </div>
              <span class="card-name">Settings</span>
            </label>
          </div>
          <div class="card">
            <input type="checkbox" id="c-14" class="card-input" />
            <label for="c-14" class="card-label">
              <div class="card-icon">
                <span class="ci-detail"><svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.9 2 2 2zm6-6v-5c0-3.07-1.64-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.63 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z"/></svg></span>
                <span class="ci-glass"></span>
                <span class="ci-bg"></span>
              </div>
              <span class="card-name">Notification</span>
            </label>
          </div>
          <div class="card">
            <input type="checkbox" id="c-15" class="card-input" />
            <label for="c-15" class="card-label">
              <div class="card-icon">
                <span class="ci-detail"><svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M15.67 4H14V2h-4v2H8.33C7.6 4 7 4.6 7 5.33v15.33C7 21.4 7.6 22 8.33 22h7.33c.74 0 1.34-.6 1.34-1.33V5.33C17 4.6 16.4 4 15.67 4z"/></svg></span>
                <span class="ci-glass"></span>
                <span class="ci-bg"></span>
              </div>
              <span class="card-name">Battery</span>
            </label>
          </div>
          <div class="card">
            <input type="checkbox" id="c-16" class="card-input" />
            <label for="c-16" class="card-label">
              <div class="card-icon">
                <span class="ci-detail"><svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M21 2H3c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h7l-2 3v1h8v-1l-2-3h7c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 12H3V4h18v10z"/></svg></span>
                <span class="ci-glass"></span>
                <span class="ci-bg"></span>
              </div>
              <span class="card-name">Display</span>
            </label>
          </div>
        </div>

      </div><!-- end .tab-panels -->

      <!-- Glass Tab Bar -->
      <nav class="tab-bar">
        <label for="tab-01" class="tab-label">
          <div class="tab-icon tab-icon--01">
            <span class="ti-detail"></span>
            <span class="ti-glass"></span>
            <span class="ti-bg"></span>
          </div>
        </label>
        <label for="tab-02" class="tab-label">
          <div class="tab-icon tab-icon--02">
            <span class="ti-detail"></span>
            <span class="ti-glass"></span>
            <span class="ti-bg"></span>
          </div>
        </label>
        <label for="tab-03" class="tab-label">
          <div class="tab-icon tab-icon--03">
            <span class="ti-detail"></span>
            <span class="ti-glass"></span>
            <span class="ti-bg"></span>
          </div>
        </label>
        <label for="tab-04" class="tab-label">
          <div class="tab-icon tab-icon--04">
            <span class="ti-detail"></span>
            <span class="ti-glass"></span>
            <span class="ti-bg"></span>
          </div>
        </label>
      </nav>

    </div><!-- end .glass-panel -->

  </body>
</html>
